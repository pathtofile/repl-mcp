repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=100]

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.3.3
    hooks:
      - id: pylint
        args: [--max-line-length=100]
        additional_dependencies:
          - textual
          - mcp[cli]
          - uvicorn
          - pyte
